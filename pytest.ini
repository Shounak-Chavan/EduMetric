[pytest]

python_files = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 7.0

pythonpath = .

asyncio_mode = auto
asyncio_default_fixture_loop_scope = session   # ✅ changed from function to session

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    auth: Authentication tests
    api: API endpoint tests
    slow: Slow running tests
    integration: Integration tests