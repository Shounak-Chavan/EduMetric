name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Lint code
    - name: Lint code
      run: |
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build and Push Docker image
    - name: Build and Push Docker image
      run: |
        IMAGE_TAG=v${{ github.run_number }}

        docker build -t shounakchavan/edumetric:$IMAGE_TAG .
        docker tag shounakchavan/edumetric:$IMAGE_TAG shounakchavan/edumetric:latest

        docker push shounakchavan/edumetric:$IMAGE_TAG
        docker push shounakchavan/edumetric:latest

    # Verify Docker container
    - name: Verify Docker container
      run: |
        docker run --rm shounakchavan/edumetric:latest python -c "print('Container validation successful')"

    # Final status
    - name: Deployment status
      run: |
        echo "CI/CD pipeline completed successfully"
        echo "Docker image pushed to Docker Hub"